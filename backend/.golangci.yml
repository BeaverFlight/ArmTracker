version: "2"

run:
  timeout: 3m
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true # было: format: colored-line-number
      print-issued-lines: true # перенесено сюда из корня output
      print-linter-name: true # перенесено сюда из корня output
      # sort-results удалён — в v2 сортировка всегда включена

linters:
  enable:
    - gocyclo
    - cyclop
    - funlen
    - gocognit
    - dupl
    - goconst
    - gocritic
    - errcheck
    - govet
    - staticcheck
    - unused
    - bodyclose
    - contextcheck

  settings: # было: linters-settings (верхний уровень)
    gocyclo:
      min-complexity: 7

    cyclop:
      max-complexity: 7
      package-average: 5

    gocognit:
      min-complexity: 10

    funlen:
      lines: 30
      statements: 40
      ignore-comments: true

    dupl:
      threshold: 100 # было: thresold — опечатка

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam

    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable:
        - shadow

  exclusions: # было: issues.exclude-rules
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocyclo
          - cyclop
          - gocognit
          - dupl
          - gocritic
          - errcheck
